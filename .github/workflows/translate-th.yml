name: Translate th

on:
  repository_dispatch:
    types:
      - translate-th-release
  schedule:
    - cron: "47 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  translate:
    uses: ./.github/workflows/translate-locale-reusable.yml
    with:
      locale: th
      locale_slug: th
    secrets: inherit
